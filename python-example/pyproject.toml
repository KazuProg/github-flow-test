[project]
name = "python-example"
version = "0.0.0"
description = "Python版の自動リリース検証用サンプル(GitHub Flow + python-semantic-release)"
requires-python = ">=3.13"

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
tag_format = "python-v{version}"
allow_zero_version = true
mask_initial_release = false
commit_parser = "conventional"
commit_message = "chore(release): python-v{version} [skip ci]\n\nAutomatically generated by python-semantic-release"

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "revert", "refactor", "docs", "style", "test", "build", "ci", "chore"]
allowed_tags = ["feat", "fix", "perf", "revert", "refactor", "docs", "style", "test", "build", "ci", "chore"]

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
