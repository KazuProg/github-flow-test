# cocogitto configuration
# Node (package.json) と Python (pyproject.toml) を同一コミット履歴で同期バンプする。
# 設計背景は CONTRIBUTING.md の「Node/Python の同期バージョニング」を参照。

tag_prefix = "v"
branch_whitelist = ["main"]

pre_bump_hooks = [
  "npm version {{version}} --no-git-tag-version --allow-same-version",
  "sed -i 's/^version = \".*\"$/version = \"{{version}}\"/' pyproject.toml",
]

post_bump_hooks = [
  "git push",
  "git push origin {{version_tag}}",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "KazuProg"
repository = "github-flow-test"

# CONTRIBUTING.md の type 一覧テーブルと 1:1 対応させる。
# feat/fix はcocogittoの組み込みデフォルトと実質一致するが、対応を明示するため書く。
# 成果物(package.json/pyproject.tomlのバージョン)に実質的な変更を伴う型のみ
# bump_minor/bump_patchを明示する(catch-allルールが無いため、無指定の型は静的にバンプ対象外)。
# docs/style/test/choreは成果物に影響しないためbumpを付けない。
# ciは本リポジトリの性質上リリース自動化そのものへの機能追加・更新とみなし、
# featと同じbump_minor対象にしている(詳細はCONTRIBUTING.md参照)。

[commit_types.feat]
changelog_title = "Features"
bump_minor = true
order = 1

[commit_types.fix]
changelog_title = "Bug Fixes"
bump_patch = true
order = 2

[commit_types.perf]
changelog_title = "Performance Improvements"
bump_patch = true
order = 3

[commit_types.revert]
changelog_title = "Reverts"
bump_patch = true
order = 4

[commit_types.refactor]
changelog_title = "Code Refactoring"
bump_patch = true
order = 5

[commit_types.docs]
changelog_title = "Documentation"
order = 6

[commit_types.style]
changelog_title = "Styles"
order = 7

[commit_types.test]
changelog_title = "Tests"
order = 8

[commit_types.build]
changelog_title = "Build System"
bump_patch = true
order = 9

[commit_types.ci]
changelog_title = "Continuous Integration"
bump_minor = true
order = 10

[commit_types.chore]
changelog_title = "Chores"
order = 11
